<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رفع الملفات إلى R2</title>
</head>
<body>
    <h2>نظام رفع الملفات السحابي</h2>
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">رفع الملف</button>
    <p id="status"></p>

    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1000.0.min.js"></script>
    <script>
        // ضع المفاتيح هنا مرة واحدة فقط
        const R2_ENDPOINT = "https://24d79d5b07f5051f2f201553fcbebbce.r2.cloudflarestorage.com";
        const ACCESS_KEY_ID = "a2cbca47e0a95c1ed288709f91dc826b";
        const SECRET_ACCESS_KEY = "303b2c8ecc60d3c7e1d66f7bdd4f42af61421241b5861aca837869db73a43db2";
        const BUCKET_NAME = "nfc-files";

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            const status = document.getElementById('status');
            if (!file) return alert("اختر ملفاً");

            const s3 = new AWS.S3({
                endpoint: R2_ENDPOINT,
                accessKeyId: ACCESS_KEY_ID,
                secretAccessKey: SECRET_ACCESS_KEY,
                signatureVersion: 'v4',
                region: 'auto'
            });

            status.innerText = "جاري الرفع...";
            try {
                await s3.putObject({ Bucket: BUCKET_NAME, Key: file.name, Body: file }).promise();
                status.innerText = "تم الرفع بنجاح!";
            } catch (err) {
                status.innerText = "خطأ: تأكد من إعدادات CORS في Cloudflare.";
            }
        }
    </script>
</body>
</html>
