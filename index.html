<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFC GO - Premium Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1000.0.min.js"></script>
</head>
<body class="light-mode">

    <div id="app-container" class="app-container">
        <header class="dashboard-header">
            <div class="header-brand-block">
                <span class="brand-title">NFC GO</span>
            </div>
        </header>

        <main class="main-content">
            <section class="explorer-view-wrapper">
                <div id="file-explorer-grid" class="file-explorer-grid">
                    </div>
            </section>
        </main>

        <input type="file" id="sidebar-file-input" class="hidden" style="display:none;" />
        <nav class="bottom-navigation-bar">
            <div class="central-action-container">
                <button id="sidebar-upload-btn" class="central-glowing-btn">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
        </nav>
    </div>

    <script>
        // إعدادات الاتصال بـ R2
        const R2_CONFIG = {
            endpoint: "https://24d79d5b07f5051f2f201553fcbebbce.r2.cloudflarestorage.com",
            accessKeyId: "a2cbca47e0a95c1ed288709f91dc826b",
            secretAccessKey: "303b2c8ecc60d3c7e1d66f7bdd4f42af61421241b5861aca837869db73a43db2",
            bucket: "nfc-files"
        };

        const s3 = new AWS.S3({
            endpoint: R2_CONFIG.endpoint,
            accessKeyId: R2_CONFIG.accessKeyId,
            secretAccessKey: R2_CONFIG.secretAccessKey,
            signatureVersion: 'v4',
            region: 'auto'
        });

        // تشغيل زر الرفع
        document.getElementById('sidebar-upload-btn').addEventListener('click', () => {
            document.getElementById('sidebar-file-input').click();
        });

        document.getElementById('sidebar-file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            try {
                await s3.putObject({ Bucket: R2_CONFIG.bucket, Key: file.name, Body: file }).promise();
                alert("تم الرفع بنجاح!");
                loadFiles(); 
            } catch (err) {
                alert("فشل الرفع، تأكد من إعدادات CORS.");
            }
        });

        // دالة جلب الملفات
        async function loadFiles() {
            const grid = document.getElementById('file-explorer-grid');
            try {
                const data = await s3.listObjects({ Bucket: R2_CONFIG.bucket }).promise();
                grid.innerHTML = ''; 
                data.Contents.forEach(file => {
                    grid.innerHTML += `
                        <div class="file-card">
                            <p>${file.Key}</p>
                            <button onclick="window.open('${R2_CONFIG.endpoint}/${R2_CONFIG.bucket}/${file.Key}')">تحميل</button>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        loadFiles();
    </script>
</body>
</html>
