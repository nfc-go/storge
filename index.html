<!DOCTYPE html>
<html lang="ar" id="html-lang" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>NFC GO - Premium Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1000.0.min.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f9f9f9; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .file-card { background: white; padding: 10px; border-radius: 12px; cursor: pointer; }
        
        /* نافذة عرض الصورة (التي ستظهر عند الضغط) */
        #viewer { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; }
        #viewer img { max-width: 90%; max-height: 70%; border-radius: 10px; }
        .viewer-actions { margin-top: 20px; color: white; }
    </style>
</head>
<body>

    <header style="display:flex; justify-content: space-between; padding: 20px;">
        <button onclick="toggleLang()">🔄 <span id="lang-text">English</span></button>
        <h2>NFC GO</h2>
    </header>

    <div id="file-grid" class="grid"></div>

    <div id="viewer">
        <img id="view-img" src="">
        <div class="viewer-actions">
            <button onclick="downloadCurrent()"><i class="fa-solid fa-download"></i> تحميل</button>
            <button onclick="toggleFav()"><i class="fa-solid fa-heart"></i> مفضلة</button>
            <button onclick="document.getElementById('viewer').style.display='none'">إغلاق</button>
        </div>
    </div>

    <script>
        let currentFile = "";
        
        // 1. تبديل اللغة
        function toggleLang() {
            const html = document.getElementById('html-lang');
            const isAr = html.dir === 'rtl';
            html.dir = isAr ? 'ltr' : 'rtl';
            document.getElementById('lang-text').innerText = isAr ? 'العربية' : 'English';
        }

        // 2. عرض الصورة في نافذة
        function openViewer(url, key) {
            currentFile = key;
            document.getElementById('view-img').src = url;
            document.getElementById('viewer').style.display = 'flex';
        }

        // 3. التحميل والمفضلة داخل النافذة
        function downloadCurrent() { window.open(currentFile); }
        
        function toggleFav() {
            let favs = JSON.parse(localStorage.getItem('favs') || '[]');
            if(!favs.includes(currentFile)) {
                favs.push(currentFile);
                localStorage.setItem('favs', JSON.stringify(favs));
                alert("تم الحفظ في المفضلة!");
            }
        }

        // 4. عرض الملفات
        async function loadFiles() {
            // (استخدم نفس كود الـ s3.listObjects السابق هنا)
            // عند بناء الـ Grid، اجعل الكارت يفتح النافذة:
            // grid.innerHTML += `<div class="file-card" onclick="openViewer('${url}', '${key}')">...</div>`
        }

        loadFiles();
    </script>
</body>
</html>
